<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1f2937"/>
      <stop offset="1" stop-color="#3b2f1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="1000" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="2"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="2">
    <path d="M0 200H1600M0 400H1600M0 600H1600M0 800H1600"/>
    <path d="M200 0V1000M400 0V1000M600 0V1000M800 0V1000M1000 0V1000M1200 0V1000M1400 0V1000"/>
  </g>

  <!-- card plate -->
  <g filter="url(#softShadow)">
    <rect x="190" y="170" width="1220" height="660" rx="34" fill="#0b1220" opacity="0.55"/>
    <rect x="190" y="170" width="1220" height="660" rx="34" fill="url(#accent)"/>
    <rect x="190" y="170" width="1220" height="660" rx="34" fill="none" stroke="#d4af37" stroke-opacity="0.25" stroke-width="3"/>
  </g>

  <!-- simple building icon -->
  <g transform="translate(640 300)" opacity="0.92">
    <rect x="0" y="80" width="320" height="300" rx="18" fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>
    <rect x="55" y="0" width="210" height="420" rx="20" fill="#ffffff" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.20" stroke-width="3"/>
    <g fill="#ffffff" fill-opacity="0.35">
      <rect x="90" y="60" width="40" height="40" rx="8"/>
      <rect x="150" y="60" width="40" height="40" rx="8"/>
      <rect x="210" y="60" width="40" height="40" rx="8"/>
      <rect x="90" y="120" width="40" height="40" rx="8"/>
      <rect x="150" y="120" width="40" height="40" rx="8"/>
      <rect x="210" y="120" width="40" height="40" rx="8"/>
      <rect x="90" y="180" width="40" height="40" rx="8"/>
      <rect x="150" y="180" width="40" height="40" rx="8"/>
      <rect x="210" y="180" width="40" height="40" rx="8"/>
      <rect x="140" y="260" width="60" height="90" rx="12" fill-opacity="0.28"/>
    </g>
  </g>

  <!-- label -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Apple Color Emoji', 'Segoe UI Emoji'">
    <text x="800" y="795" text-anchor="middle" font-size="42" fill="#ffffff" fill-opacity="0.86" font-weight="700">
      Property image unavailable
    </text>
    <text x="800" y="845" text-anchor="middle" font-size="24" fill="#ffffff" fill-opacity="0.62">
      Well update photos soon
    </text>
  </g>
</svg>
